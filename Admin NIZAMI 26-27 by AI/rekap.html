<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Sistem Inventory & Logistik</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #ffd700;
        --bg: #121212;
        --surface: #1e1e1e;
        --text: #e0e0e0;
        --border: #333;
        --danger: #ff4d4d;
        --success: #4ade80;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        padding-bottom: 120px;
      }

      /* NAVIGASI ATAS */
      .top-nav {
        background: rgba(18, 18, 18, 0.95);
        backdrop-filter: blur(10px);
        padding: 15px 20px;
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .nav-left {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .back-btn {
        background: #2a2a2a;
        color: white;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
      }
      .btn-refresh {
        background: rgba(255, 215, 0, 0.1);
        color: var(--primary);
        border: 1px solid rgba(255, 215, 0, 0.3);
        padding: 8px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: bold;
      }

      /* AREA FILTER */
      .filter-box {
        padding: 15px 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: #181818;
        border-bottom: 1px dashed #333;
      }
      .filter-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .filter-select {
        width: 100%;
        padding: 10px;
        background: #222;
        border: 1px solid #444;
        color: #fff;
        border-radius: 8px;
        outline: none;
        font-size: 0.85rem;
        appearance: none;
        background-image: url('data:image/svg+xml;utf8,<svg fill="%23888" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
        background-repeat: no-repeat;
        background-position: right 10px center;
      }
      .filter-select:focus {
        border-color: var(--primary);
      }

      /* STATISTIK PESERTA (COMPACT) */
      .stats-container {
        padding: 15px 20px;
      }
      .summary-card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 15px;
      }
      .sc-header {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 10px;
      }
      .sc-val {
        font-size: 1.8rem;
        font-weight: bold;
        color: var(--primary);
        line-height: 1;
      }
      .sc-label {
        font-size: 0.8rem;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .sc-body {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .sc-chip {
        background: #252525;
        border: 1px solid #444;
        color: #ccc;
        font-size: 0.75rem;
        padding: 4px 10px;
        border-radius: 20px;
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .sc-chip b {
        color: #fff;
        background: #444;
        padding: 2px 6px;
        border-radius: 10px;
        font-size: 0.7rem;
      }

      /* PENCARIAN & ACTION BAR */
      .search-container {
        padding: 0 20px 10px 20px;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .search-input {
        flex: 1;
        padding: 12px 15px;
        background: #1a1a1a;
        border: 1px solid #444;
        color: white;
        border-radius: 10px;
        outline: none;
        font-size: 0.95rem;
      }
      .search-input:focus {
        border-color: var(--primary);
      }
      .btn-share {
        background: rgba(74, 222, 128, 0.1);
        color: var(--success);
        border: 1px solid rgba(74, 222, 128, 0.3);
        padding: 0 15px;
        height: 44px;
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
        font-size: 1.1rem;
      }
      .btn-share:active {
        transform: scale(0.95);
      }

      /* FINANCIAL ESTIMATE & TOGGLE BAR */
      .finance-bar {
        margin: 0 20px 15px 20px;
        background: linear-gradient(
          135deg,
          rgba(255, 215, 0, 0.1) 0%,
          rgba(20, 20, 20, 0) 100%
        );
        border: 1px dashed var(--primary);
        padding: 12px 15px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .finance-info h4 {
        margin: 0 0 3px 0;
        font-size: 0.7rem;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .finance-info .val {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--primary);
      }

      .toggle-container {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        color: #aaa;
        cursor: pointer;
      }
      .toggle-switch {
        position: relative;
        width: 36px;
        height: 20px;
        background: #333;
        border-radius: 20px;
        transition: 0.3s;
      }
      .toggle-switch::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        background: #fff;
        border-radius: 50%;
        transition: 0.3s;
      }
      .toggle-container input {
        display: none;
      }
      .toggle-container input:checked + .toggle-switch {
        background: var(--primary);
      }
      .toggle-container input:checked + .toggle-switch::after {
        left: calc(100% - 18px);
        background: #000;
      }

      /* LIST BARANG */
      .list-container {
        padding: 0 20px 20px 20px;
      }
      .section-title {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        display: flex;
        justify-content: space-between;
        font-weight: bold;
      }

      .shop-item {
        background: var(--surface);
        border: 1px solid #333;
        border-radius: 12px;
        margin-bottom: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .shop-item.aman {
        border-left: 4px solid var(--success);
      }
      .shop-item.kurang {
        border-left: 4px solid var(--danger);
      }

      .item-main {
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
      }
      .item-info {
        flex: 1;
      }
      .item-name {
        font-size: 1rem;
        font-weight: bold;
        color: #fff;
        margin: 0 0 5px 0;
        line-height: 1.3;
      }
      .item-details {
        font-size: 0.75rem;
        color: #888;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .item-details span {
        background: #111;
        padding: 3px 8px;
        border-radius: 6px;
        border: 1px solid #2a2a2a;
      }

      .item-status {
        font-size: 0.75rem;
        font-weight: bold;
        padding: 4px 8px;
        border-radius: 6px;
        white-space: nowrap;
        text-align: center;
      }
      .status-kurang {
        background: rgba(255, 77, 77, 0.1);
        color: var(--danger);
        border: 1px solid rgba(255, 77, 77, 0.3);
      }
      .status-aman {
        background: rgba(74, 222, 128, 0.1);
        color: var(--success);
        border: 1px solid rgba(74, 222, 128, 0.3);
      }

      .item-footer {
        background: #151515;
        border-top: 1px dashed #333;
        padding: 12px 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .ready-stock {
        font-size: 0.85rem;
        color: #ccc;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .ready-stock b {
        color: var(--primary);
        font-size: 1.1rem;
      }

      .input-wrapper {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .input-wrapper label {
        font-size: 0.7rem;
        color: #888;
        text-transform: uppercase;
      }
      .input-qty {
        width: 70px;
        padding: 8px;
        background: #222;
        border: 1px solid #555;
        color: #fff;
        border-radius: 8px;
        text-align: center;
        font-weight: bold;
        outline: none;
        font-size: 0.9rem;
        transition: 0.2s;
      }
      .input-qty:focus {
        border-color: var(--primary);
        background: #000;
      }

      /* BOTTOM ACTION */
      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(20, 20, 20, 0.95);
        backdrop-filter: blur(10px);
        padding: 15px 20px;
        border-top: 1px solid #333;
        z-index: 100;
        display: flex;
        gap: 10px;
      }
      .btn-out {
        flex: 1;
        padding: 14px;
        background: #2a2a2a;
        color: var(--danger);
        border: 1px solid #444;
        border-radius: 12px;
        font-weight: bold;
        font-size: 0.85rem;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
      }
      .btn-save {
        flex: 1.5;
        padding: 14px;
        background: var(--primary);
        color: #000;
        border: none;
        border-radius: 12px;
        font-weight: bold;
        font-size: 0.85rem;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
      }
      .btn-save:active {
        transform: scale(0.98);
      }

      #loading {
        text-align: center;
        padding: 60px 20px;
        color: #888;
        font-size: 0.9rem;
      }

      /* MODAL DISTRIBUSI KELUAR */
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(5px);
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
      }
      .modal-content {
        background: var(--surface);
        width: 100%;
        height: 85vh;
        border-radius: 20px 20px 0 0;
        display: flex;
        flex-direction: column;
        animation: slideUp 0.3s;
        border-top: 1px solid #444;
      }
      .m-head {
        padding: 20px;
        border-bottom: 1px solid #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .m-body {
        padding: 20px;
        overflow-y: auto;
        flex-grow: 1;
      }
      .m-footer {
        padding: 20px;
        background: #111;
        border-top: 1px solid #333;
      }

      .peserta-select-box {
        background: #151515;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid #333;
        margin-bottom: 20px;
      }
      .peserta-select {
        width: 100%;
        padding: 12px;
        background: #222;
        color: #fff;
        border: 1px solid #555;
        border-radius: 8px;
        font-size: 0.9rem;
        margin-top: 8px;
        outline: none;
      }

      .item-dist-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px dashed #333;
      }
      .stepper {
        display: flex;
        align-items: center;
        background: #000;
        border-radius: 8px;
        border: 1px solid #444;
        overflow: hidden;
      }
      .stepper button {
        background: #222;
        border: none;
        color: var(--primary);
        width: 35px;
        height: 35px;
        font-weight: bold;
        cursor: pointer;
        font-size: 1.2rem;
      }
      .stepper button:active {
        background: #333;
      }
      .stepper input {
        width: 40px;
        background: transparent;
        border: none;
        color: #fff;
        text-align: center;
        font-weight: bold;
        outline: none;
        font-size: 1rem;
      }

      /* TOAST NOTIFICATION */
      #toast {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        background: #4ade80;
        color: #000;
        padding: 10px 20px;
        border-radius: 50px;
        font-weight: bold;
        font-size: 0.85rem;
        box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
        z-index: 99999;
        display: none;
        align-items: center;
        gap: 8px;
        transition: opacity 0.3s;
      }

      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="toast">
      <i class="fas fa-check-circle"></i>
      <span id="toastMsg">Tersalin ke Clipboard!</span>
    </div>

    <div class="top-nav">
      <div class="nav-left">
        <a href="index.html" class="back-btn"
          ><i class="fas fa-arrow-left"></i
        ></a>
        <h2 style="margin: 0; font-size: 1.1rem">Rekap Logistik</h2>
      </div>
      <button onclick="tarikDataServer()" class="btn-refresh">
        <i class="fas fa-sync-alt"></i> Refresh
      </button>
    </div>

    <div class="filter-box" id="filterArea" style="display: none">
      <select
        id="fMitra"
        class="filter-select"
        onchange="hitungUlangLogistik()"
      >
        <option value="ALL">📁 Semua Mitra</option>
      </select>
      <div class="filter-grid">
        <select
          id="fStatus"
          class="filter-select"
          onchange="hitungUlangLogistik()"
        >
          <option value="ALL">🎯 Semua Status</option>
          <option value="LUNAS">🟢 Lunas Barang</option>
          <option value="BELUM">🔴 Belum Lunas</option>
        </select>
        <select
          id="fPaket"
          class="filter-select"
          onchange="hitungUlangLogistik()"
        >
          <option value="ALL">📦 Semua Paket</option>
        </select>
      </div>
    </div>

    <div id="loading">
      <i
        class="fas fa-spinner fa-spin fa-2x"
        style="color: var(--primary); margin-bottom: 15px"
      ></i
      ><br />Menyinkronkan data gudang...
    </div>

    <div id="content" style="display: none">
      <div id="paketList" class="stats-container"></div>

      <div class="search-container">
        <input
          type="text"
          id="filterInput"
          class="search-input"
          placeholder="🔍 Cari nama barang..."
          onkeyup="renderListUiLokal()"
        />
        <button
          class="btn-share"
          onclick="copyToClipboard()"
          title="Bagikan Daftar Belanja ke WhatsApp"
        >
          <i class="fab fa-whatsapp"></i>
        </button>
      </div>

      <div class="finance-bar">
        <div class="finance-info">
          <h4>Estimasi Biaya Belanja</h4>
          <div class="val" id="estimasiBiaya">Rp 0</div>
        </div>
        <label class="toggle-container">
          <input
            type="checkbox"
            id="toggleKurang"
            onchange="renderListUiLokal()"
          />
          <div class="toggle-switch"></div>
          Hanya Kurang
        </label>
      </div>

      <div class="list-container">
        <div class="section-title">
          <span>Stok Gudang Berjalan</span>
          <span style="color: var(--primary)"><b id="lblTotal">0</b> Item</span>
        </div>
        <div id="belanjaList"></div>
      </div>
    </div>

    <div class="bottom-bar">
      <button onclick="bukaModalDistribusi()" class="btn-out">
        <i class="fas fa-box-open"></i> DISTRIBUSI
      </button>
      <button onclick="simpanBelanja()" class="btn-save" id="btnSave">
        <i class="fas fa-save"></i> SIMPAN STOK MASUK
      </button>
    </div>

    <div id="modalDist" class="modal">
      <div class="modal-content">
        <div class="m-head">
          <h3 style="margin: 0; color: var(--danger)">
            <i class="fas fa-dolly"></i> Keluarkan Barang
          </h3>
          <i
            class="fas fa-times"
            style="font-size: 1.5rem; color: #888; cursor: pointer"
            onclick="tutupModalDistribusi()"
          ></i>
        </div>
        <div class="m-body">
          <div class="peserta-select-box">
            <label>Pilih Peserta (Drop Out / Cicil):</label>
            <select
              id="distPeserta"
              class="peserta-select"
              onchange="pilihPesertaDist()"
            >
              <option value="">-- Pilih Peserta --</option>
            </select>
            <div
              id="infoSaldo"
              style="
                margin-top: 12px;
                font-size: 0.85rem;
                color: var(--success);
                display: none;
              "
            >
              Saldo Tersedia:
              <b
                id="txtSaldo"
                style="font-size: 1.2rem; display: block; margin-top: 3px"
                >Rp 0</b
              >
            </div>
          </div>

          <div
            style="
              font-size: 0.85rem;
              color: #aaa;
              margin-bottom: 10px;
              font-weight: bold;
            "
          >
            Pilih Barang dari Sisa Gudang:
          </div>
          <div id="distItemsContainer"></div>
        </div>

        <div class="m-footer">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 15px;
            "
          >
            <span style="font-size: 0.85rem; color: #aaa"
              >Total Nilai Diambil:</span
            >
            <b
              id="txtTotalAmbil"
              style="color: var(--danger); font-size: 1.3rem"
              >Rp 0</b
            >
          </div>
          <button
            onclick="simpanDistribusi()"
            class="btn-save"
            style="
              width: 100%;
              background: var(--danger);
              color: #fff;
              padding: 16px;
            "
            id="btnSimpanDist"
          >
            PROSES BARANG KELUAR
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      let masterData = {
        peserta: [],
        resep: [],
        custom: [],
        stok_dibeli: {},
        stok_keluar: {},
        harga_barang: {},
      };
      let listBelanjaFinal = [];
      let selectedPesertaSaldo = 0;
      let distCart = {};

      function formatRp(angka) {
        return new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          minimumFractionDigits: 0,
        }).format(angka || 0);
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        document.getElementById("toastMsg").innerText = msg;
        toast.style.display = "flex";
        setTimeout(() => {
          toast.style.display = "none";
        }, 3000);
      }

      async function tarikDataServer() {
        document.getElementById("content").style.display = "none";
        document.getElementById("filterArea").style.display = "none";
        document.getElementById("loading").style.display = "block";
        document.getElementById("loading").innerHTML =
          '<i class="fas fa-spinner fa-spin fa-2x" style="color: var(--primary); margin-bottom: 15px"></i><br />Menyinkronkan data gudang...';

        try {
          const data = await fetchData("getRekapBelanja");

          if (data && data.error) {
            document.getElementById("loading").innerHTML =
              `<span style='color:var(--danger);'><i class="fas fa-exclamation-triangle fa-2x" style="margin-bottom:10px;"></i><br><b>Error Database:</b><br>${data.error}</span>`;
            return;
          }

          if (data && data.peserta) {
            if (!data.stok_dibeli) data.stok_dibeli = {};
            if (!data.stok_keluar) data.stok_keluar = {};
            if (!data.harga_barang) data.harga_barang = {};

            masterData = data;
            buatOpsiFilter();
            hitungUlangLogistik();

            document.getElementById("loading").style.display = "none";
            document.getElementById("filterArea").style.display = "flex";
            document.getElementById("content").style.display = "block";
          } else {
            document.getElementById("loading").innerHTML =
              '<span style=\'color:var(--danger);\'><i class="fas fa-exclamation-triangle fa-2x" style="margin-bottom:10px;"></i><br>Gagal menarik data.<br>Pastikan Deploy Versi Baru.</span>';
          }
        } catch (e) {
          document.getElementById("loading").innerHTML =
            `<span style='color:var(--danger);'><i class="fas fa-wifi fa-2x" style="margin-bottom:10px;"></i><br>Koneksi terputus. Refresh halaman.</span>`;
        }
      }

      function buatOpsiFilter() {
        const mitras = [...new Set(masterData.peserta.map((p) => p.mitra))]
          .filter(Boolean)
          .sort();
        const pakets = [...new Set(masterData.peserta.map((p) => p.paket))]
          .filter(Boolean)
          .sort();

        let selMitra = '<option value="ALL">📁 Semua Mitra</option>';
        mitras.forEach((m) => {
          if (m !== "Pusat" && m !== "Pusat (Langsung)") {
            selMitra += `<option value="${m}">${m}</option>`;
          }
        });
        document.getElementById("fMitra").innerHTML = selMitra;

        let selPaket = '<option value="ALL">📦 Semua Paket</option>';
        pakets.forEach(
          (p) => (selPaket += `<option value="${p}">${p}</option>`),
        );
        document.getElementById("fPaket").innerHTML = selPaket;
      }

      function hitungUlangLogistik() {
        const valMitra = document.getElementById("fMitra").value;
        const valStatus = document.getElementById("fStatus").value;
        const valPaket = document.getElementById("fPaket").value;

        let pesertaLolos = masterData.peserta.filter((p) => {
          let passMitra = valMitra === "ALL" || p.mitra === valMitra;
          let passPaket = valPaket === "ALL" || p.paket === valPaket;
          let passStatus = true;

          if (String(p.paket).includes("(Selesai/DO)")) return false;

          if (valStatus === "LUNAS")
            passStatus =
              p.target_barang > 0 && p.setoran_masuk >= p.target_barang;
          else if (valStatus === "BELUM")
            passStatus =
              (p.target_barang > 0 && p.setoran_masuk < p.target_barang) ||
              p.target_barang === 0;

          return passMitra && passPaket && passStatus;
        });

        let countPaket = {};
        pesertaLolos.forEach((p) => {
          if (!countPaket[p.paket]) countPaket[p.paket] = 0;
          countPaket[p.paket]++;
        });

        let idLolos = pesertaLolos.map((p) => p.id);
        let keranjang = {};

        masterData.resep.forEach((r) => {
          if (countPaket[r.paket] > 0) {
            let totalDibutuhkan = countPaket[r.paket] * r.qty;
            if (!keranjang[r.barang])
              keranjang[r.barang] = { qty: 0, satuan: r.satuan };
            keranjang[r.barang].qty += totalDibutuhkan;
          }
        });

        masterData.custom.forEach((c) => {
          if (idLolos.includes(c.id_peserta)) {
            if (!keranjang[c.barang])
              keranjang[c.barang] = { qty: 0, satuan: c.satuan };
            keranjang[c.barang].qty += c.qty;
          }
        });

        listBelanjaFinal = [];
        for (let key in keranjang) {
          let butuh = keranjang[key].qty;
          let masuk = masterData.stok_dibeli[key] || 0;
          let keluar = masterData.stok_keluar[key] || 0;
          let ready = masuk - keluar;
          if (ready < 0) ready = 0;
          let kurang = butuh - ready;

          let hargaBrg = masterData.harga_barang[key] || 0;

          listBelanjaFinal.push({
            barang: key,
            total: butuh,
            satuan: keranjang[key].satuan,
            masuk: masuk,
            keluar: keluar,
            ready: ready,
            kurang: kurang > 0 ? kurang : 0,
            harga: hargaBrg,
          });
        }
        listBelanjaFinal.sort((a, b) => b.kurang - a.kurang);

        renderStatsUi(pesertaLolos.length, countPaket);
        renderListUiLokal();
      }

      function renderStatsUi(totalPeserta, countPaket) {
        const paketBox = document.getElementById("paketList");
        let html = `<div class="summary-card">
            <div class="sc-header"><span class="sc-val">${totalPeserta}</span><span class="sc-label">Peserta Disaring</span></div>
            <div class="sc-body">`;
        for (let pkt in countPaket)
          html += `<div class="sc-chip"><span>${pkt}</span> <b>${countPaket[pkt]}</b></div>`;
        html += `</div></div>`;
        paketBox.innerHTML = html;
      }

      function renderListUiLokal() {
        const query = document
          .getElementById("filterInput")
          .value.toLowerCase();
        const onlyKurang = document.getElementById("toggleKurang").checked;

        let estimasiBiaya = 0;

        let barangTampil = listBelanjaFinal.filter((item) => {
          // FIX CANGGIH: Jika barangnya "Uang" atau "Rupiah", jangan dikalikan harga database yang mungkin aneh.
          if (item.kurang > 0) {
            let isUang =
              item.barang.toLowerCase().includes("uang") ||
              item.satuan.toLowerCase().includes("rupiah") ||
              item.satuan.toLowerCase() === "rp";
            let hargaAsli = isUang ? 1 : item.harga;
            estimasiBiaya += item.kurang * hargaAsli;
          }

          let matchQuery = item.barang.toLowerCase().includes(query);
          let matchToggle = onlyKurang ? item.kurang > 0 : true;
          return matchQuery && matchToggle;
        });

        document.getElementById("estimasiBiaya").innerText =
          formatRp(estimasiBiaya);

        const container = document.getElementById("belanjaList");
        container.innerHTML = "";
        document.getElementById("lblTotal").innerText = barangTampil.length;

        if (barangTampil.length === 0) {
          container.innerHTML =
            '<div style="padding:40px 20px; text-align:center; color:#555; border:1px dashed #333; border-radius:12px;">Barang tidak ditemukan.</div>';
          return;
        }

        barangTampil.forEach((b, index) => {
          let isAman = b.kurang === 0;
          let clsAman = isAman ? "aman" : "kurang";
          let statusBdg = isAman
            ? `<div class="item-status status-aman">LENGKAP</div>`
            : `<div class="item-status status-kurang">KURANG ${b.kurang}</div>`;

          container.innerHTML += `
            <div class="shop-item ${clsAman}">
                <div class="item-main">
                    <div class="item-info">
                        <h4 class="item-name">${b.barang}</h4>
                        <div class="item-details">
                            <span>Target: ${b.total}</span>
                            <span>Masuk: ${b.masuk}</span>
                            <span>Keluar: ${b.keluar}</span>
                        </div>
                    </div>
                    ${statusBdg}
                </div>
                <div class="item-footer">
                    <div class="ready-stock">Sisa Gudang: <b>${b.ready}</b> ${b.satuan}</div>
                    <div class="input-wrapper">
                        <label>+ Tambah</label>
                        <input type="number" id="input_qty_${index}" class="input-qty" data-name="${b.barang}" data-sat="${b.satuan}" placeholder="0" min="0">
                    </div>
                </div>
            </div>`;
        });
      }

      // --- LOGIKA COPY KE WA ---
      function copyToClipboard() {
        if (listBelanjaFinal.length === 0) return alert("Daftar kosong!");

        const valMitra =
          document.getElementById("fMitra").options[
            document.getElementById("fMitra").selectedIndex
          ].text;
        const valPaket =
          document.getElementById("fPaket").options[
            document.getElementById("fPaket").selectedIndex
          ].text;

        let text = `🛒 *CATATAN BELANJA NIZAMI*\n`;
        text += `📝 Filter: ${valMitra}, ${valPaket}\n\n`;

        let countKurang = 0;
        let estimasiRupiah = 0;

        listBelanjaFinal.forEach((b) => {
          if (b.kurang > 0) {
            text += `• ${b.barang} : *Kurang ${b.kurang} ${b.satuan}*\n`;
            countKurang++;

            let isUang =
              b.barang.toLowerCase().includes("uang") ||
              b.satuan.toLowerCase().includes("rupiah") ||
              b.satuan.toLowerCase() === "rp";
            let hargaAsli = isUang ? 1 : b.harga;
            estimasiRupiah += b.kurang * hargaAsli;
          }
        });

        if (countKurang === 0) {
          text += "✅ Semua stok barang sudah aman/lengkap! 🎉";
        } else {
          text += `\n_Total ${countKurang} jenis barang yang harus dibeli._\n`;
          text += `💰 *Estimasi Budget Modal:* ${formatRp(estimasiRupiah)}`;
        }

        navigator.clipboard.writeText(text).then(() => {
          showToast("Daftar belanja disalin ke WA!");
        });
      }

      // --- LOGIKA SIMPAN KE INVENTORY ---
      async function simpanBelanja() {
        let itemsToSave = [];
        document.querySelectorAll(".input-qty").forEach((inp) => {
          let val = parseInt(inp.value);
          if (val > 0) {
            itemsToSave.push({
              nama: inp.getAttribute("data-name"),
              satuan: inp.getAttribute("data-sat"),
              qty: val,
            });
          }
        });

        if (itemsToSave.length === 0)
          return alert("Belum ada angka penambahan stok yang diisi.");
        if (
          !confirm(
            `Simpan penambahan untuk ${itemsToSave.length} jenis barang ini ke gudang?`,
          )
        )
          return;

        const btn = document.getElementById("btnSave");
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
        btn.disabled = true;

        const res = await fetchData(
          "simpanBelanja",
          { items: itemsToSave },
          "POST",
        );
        if (res && res.success) {
          showToast("Stok berhasil ditambahkan!");
          tarikDataServer();
        } else alert("Gagal menyimpan data.");

        btn.innerHTML = '<i class="fas fa-save"></i> SIMPAN STOK MASUK';
        btn.disabled = false;
      }

      // ========================================================
      // LOGIKA DISTRIBUSI (BARANG KELUAR / DROP OUT)
      // ========================================================
      function bukaModalDistribusi() {
        const sel = document.getElementById("distPeserta");
        sel.innerHTML = '<option value="">-- Pilih Peserta --</option>';

        masterData.peserta.forEach((p) => {
          if (!String(p.paket).includes("(Selesai/DO)")) {
            sel.innerHTML += `<option value="${p.id}">${p.nama} (${p.id}) - ${p.paket}</option>`;
          }
        });

        distCart = {};
        document.getElementById("infoSaldo").style.display = "none";
        document.getElementById("txtTotalAmbil").innerText = "Rp 0";
        renderDistItems();

        document.getElementById("modalDist").style.display = "flex";
      }

      function tutupModalDistribusi() {
        document.getElementById("modalDist").style.display = "none";
      }

      function pilihPesertaDist() {
        const id = document.getElementById("distPeserta").value;
        if (!id) {
          document.getElementById("infoSaldo").style.display = "none";
          selectedPesertaSaldo = 0;
          return;
        }

        const p = masterData.peserta.find((x) => x.id === id);
        if (p) {
          selectedPesertaSaldo = p.saldo_rp;
          document.getElementById("txtSaldo").innerText =
            formatRp(selectedPesertaSaldo);
          document.getElementById("infoSaldo").style.display = "block";
        }
      }

      function renderDistItems() {
        const container = document.getElementById("distItemsContainer");
        container.innerHTML = "";

        let adaReady = false;

        listBelanjaFinal.forEach((b) => {
          if (b.ready > 0) {
            adaReady = true;
            let hrg = masterData.harga_barang[b.barang] || 0;
            let curQty = distCart[b.barang] ? distCart[b.barang].qty : 0;

            container.innerHTML += `
                 <div class="item-dist-row">
                    <div style="flex:1; padding-right:10px;">
                        <div style="color:#fff; font-weight:bold; font-size:0.9rem; margin-bottom:2px;">${b.barang}</div>
                        <div style="font-size:0.75rem; color:#aaa;">${formatRp(hrg)} &bull; Sisa: <span style="color:var(--success)">${b.ready}</span></div>
                    </div>
                    <div class="stepper">
                        <button onclick="updateCartDist('${b.barang}', ${hrg}, ${b.ready}, -1)">-</button>
                        <input type="text" readonly value="${curQty}">
                        <button onclick="updateCartDist('${b.barang}', ${hrg}, ${b.ready}, 1)">+</button>
                    </div>
                 </div>`;
          }
        });

        if (!adaReady)
          container.innerHTML =
            "<div style='color:#666; text-align:center; padding:30px; border:1px dashed #333; border-radius:12px;'>Sisa Gudang (Ready Stock) masih kosong.</div>";
      }

      function updateCartDist(nmBarang, hrg, maxReady, change) {
        if (!distCart[nmBarang]) distCart[nmBarang] = { qty: 0, harga: hrg };

        let newQty = distCart[nmBarang].qty + change;
        if (newQty < 0) newQty = 0;
        if (newQty > maxReady) {
          alert("Gagal! Melebihi batas Ready Stock di gudang.");
          return;
        }

        distCart[nmBarang].qty = newQty;
        if (distCart[nmBarang].qty === 0) delete distCart[nmBarang];

        renderDistItems();
        hitungTotalDist();
      }

      function hitungTotalDist() {
        let total = 0;
        for (let k in distCart) {
          total += distCart[k].qty * distCart[k].harga;
        }
        document.getElementById("txtTotalAmbil").innerText = formatRp(total);

        const txtTotal = document.getElementById("txtTotalAmbil");
        if (selectedPesertaSaldo > 0 && total > selectedPesertaSaldo) {
          txtTotal.style.color = "var(--danger)";
        } else {
          txtTotal.style.color = "var(--success)";
        }
      }

      async function simpanDistribusi() {
        const idPeserta = document.getElementById("distPeserta").value;
        let itemsOut = [];
        let totalRp = 0;

        for (let k in distCart) {
          itemsOut.push({ nama: k, qty: distCart[k].qty });
          totalRp += distCart[k].qty * distCart[k].harga;
        }

        if (itemsOut.length === 0)
          return alert("Belum ada barang yang dipilih untuk dikeluarkan.");
        if (!idPeserta) return alert("Pilih peserta terlebih dahulu.");

        if (totalRp > selectedPesertaSaldo) {
          if (
            !confirm(
              `PERINGATAN: Nilai barang (Rp ${totalRp.toLocaleString()}) melebihi saldo peserta (Rp ${selectedPesertaSaldo.toLocaleString()}). Tetap lanjutkan?`,
            )
          )
            return;
        }

        let msg = `Keluarkan ${itemsOut.length} jenis barang dari Gudang untuk peserta ini?\n\nOtomatis merubah status peserta menjadi Selesai/DO.`;
        if (!confirm(msg)) return;

        const btn = document.getElementById("btnSimpanDist");
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        btn.disabled = true;

        const payload = {
          items: itemsOut,
          idPeserta: idPeserta,
          tandaiLunas: true,
        };
        const res = await fetchData("simpanDistribusi", payload, "POST");

        if (res && res.success) {
          showToast("Berhasil mendistribusikan barang!");
          tutupModalDistribusi();
          tarikDataServer();
        } else {
          alert("Gagal memproses: " + (res ? res.error : ""));
        }

        btn.innerHTML = "PROSES BARANG KELUAR";
        btn.disabled = false;
      }

      tarikDataServer();
    </script>
  </body>
</html>
