<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Dashboard Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #ffd700;
        --bg: #121212;
        --surface: #1e1e1e;
        --text: #e0e0e0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        margin: 0;
        padding-bottom: 60px;
      }
      * {
        box-sizing: border-box;
      }

      header {
        padding: 20px 20px 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .greeting {
        font-size: 0.9rem;
        color: #aaa;
        margin: 0;
      }
      .brand {
        font-size: 1.4rem;
        font-weight: 700;
        color: #fff;
        margin: 0;
      }
      .brand span {
        color: var(--primary);
      }
      .profile-icon {
        width: 40px;
        height: 40px;
        background: var(--surface);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #333;
        cursor: pointer;
      }

      .hero-container {
        padding: 10px 20px;
      }
      .hero-card {
        background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%);
        border-radius: 20px;
        padding: 25px;
        color: #000;
        box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15);
        position: relative;
        overflow: hidden;
      }
      .hero-card::before {
        content: "";
        position: absolute;
        top: -30px;
        right: -30px;
        width: 120px;
        height: 120px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
      }
      .hero-label {
        font-size: 0.85rem;
        font-weight: 600;
        opacity: 0.7;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .hero-balance {
        font-size: 2.2rem;
        font-weight: 800;
        margin: 5px 0 15px 0;
        letter-spacing: -1px;
      }

      .hero-stats {
        display: flex;
        gap: 20px;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
        padding-top: 15px;
      }
      .stat-item b {
        display: block;
        font-size: 1.2rem;
      }
      .stat-item span {
        font-size: 0.75rem;
        opacity: 0.7;
        font-weight: 600;
      }

      .section-title {
        padding: 0 20px;
        margin: 25px 0 15px 0;
        font-size: 0.9rem;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .menu-container {
        padding: 0 20px;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }
      .menu-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: #ccc;
        transition: 0.2s;
      }
      .menu-item:active {
        transform: scale(0.95);
        opacity: 0.8;
      }
      .menu-box {
        width: 100%;
        aspect-ratio: 1/1;
        background: var(--surface);
        border-radius: 16px;
        border: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
        color: var(--primary);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }
      .menu-item span {
        font-size: 0.75rem;
        text-align: center;
        line-height: 1.2;
      }
      .menu-item.active .menu-box {
        border-color: var(--primary);
      }
      .menu-item.active span {
        color: var(--primary);
      }

      /* AREA FILTER MULTI-SELECT KHUSUS */
      .paket-container {
        padding: 10px 20px;
        margin-top: 10px;
      }
      .filter-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 15px;
      }

      .filter-select-normal {
        background: #1a1a1a;
        color: var(--primary);
        border: 1px dashed #444;
        padding: 12px;
        border-radius: 10px;
        font-size: 0.85rem;
        outline: none;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        appearance: none;
        background-image: url('data:image/svg+xml;utf8,<svg fill="%23ffd700" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
        background-repeat: no-repeat;
        background-position: right 10px center;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .cs-wrap {
        position: relative;
        width: 100%;
      }
      .cs-header {
        background: #1a1a1a;
        border: 1px dashed #444;
        padding: 12px 10px;
        border-radius: 10px;
        font-size: 0.8rem;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        user-select: none;
      }
      .cs-header.has-val {
        color: var(--primary);
        border-color: var(--primary);
      }

      .cs-list {
        display: none;
        position: absolute;
        top: 105%;
        left: 0;
        width: 100%;
        background: #111;
        border: 1px solid #444;
        border-radius: 10px;
        z-index: 60;
        max-height: 250px;
        overflow-y: auto;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
        padding: 10px;
        flex-direction: column;
        gap: 10px;
      }
      .cs-list.show {
        display: flex;
      }
      .cs-list label {
        font-size: 0.85rem;
        color: #ddd;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 0;
      }
      .cs-list input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--primary);
        cursor: pointer;
      }

      .paket-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .paket-item {
        background: var(--surface);
        border: 1px solid #333;
        padding: 15px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #fff;
        font-size: 0.95rem;
        cursor: pointer;
        transition: 0.2s;
        font-weight: 600;
      }
      .paket-item:active {
        transform: scale(0.98);
        background: #25251a;
        border-color: var(--primary);
      }
      .paket-item b {
        color: var(--primary);
        background: rgba(255, 215, 0, 0.1);
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* MODAL / POPUP CSS */
      #modalDetail {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(5px);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-content {
        background: var(--surface);
        width: 100%;
        max-width: 400px;
        border-radius: 16px;
        border: 1px solid #444;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        max-height: 80vh;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
      .modal-header {
        padding: 15px 20px;
        border-bottom: 1px dashed #333;
        background: #1a1a1a;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .modal-header h3 {
        margin: 0;
        color: var(--primary);
        font-size: 1.05rem;
      }
      .close-btn {
        color: #aaa;
        cursor: pointer;
        font-size: 1.3rem;
        padding: 5px;
      }
      .modal-body {
        padding: 15px 20px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* KARTU PESERTA DI DALAM MODAL */
      .detail-item {
        background: #111;
        padding: 12px 15px;
        border-radius: 10px;
        border: 1px solid #2a2a2a;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .detail-info h4 {
        margin: 0 0 5px 0;
        font-size: 0.95rem;
        color: #fff;
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .detail-info span {
        font-size: 0.75rem;
        color: #aaa;
        background: #222;
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid #333;
      }
      .badge-freq {
        font-size: 0.7rem;
        background: rgba(74, 222, 128, 0.1);
        color: #4ade80;
        padding: 3px 6px;
        border-radius: 4px;
        border: 1px solid rgba(74, 222, 128, 0.3);
      }
      .badge-mitra {
        font-size: 0.7rem;
        background: #222;
        color: #ffd700;
        padding: 3px 6px;
        border-radius: 4px;
        border: 1px solid #444;
      }
      .btn-delete {
        background: rgba(255, 82, 82, 0.1);
        border: 1px solid rgba(255, 82, 82, 0.3);
        color: #ff5252;
        cursor: pointer;
        font-size: 1.1rem;
        padding: 8px 12px;
        border-radius: 8px;
        transition: 0.2s;
        margin-left: 10px;
      }
      .btn-delete:active {
        background: #ff5252;
        color: #fff;
      }

      .skeleton {
        background: #222;
        height: 45px;
        border-radius: 12px;
        animation: pulse 1.5s infinite;
        margin-bottom: 10px;
      }
      @keyframes pulse {
        0% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
        100% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <p class="greeting" id="greetingText">Halo, Admin</p>
        <h1 class="brand">NIZAMI <span>2026-2027</span></h1>
      </div>
      <div class="profile-icon" onclick="logout()">
        <i class="fas fa-sign-out-alt" style="color: #ff5252"></i>
      </div>
    </header>

    <div class="hero-container">
      <div class="hero-card">
        <div class="hero-label">Total Uang Masuk</div>
        <div class="hero-balance" id="dashUang">Rp ...</div>
        <div class="hero-stats">
          <div class="stat-item">
            <b id="dashPeserta">...</b><span>Total Peserta</span>
          </div>
          <div class="stat-item">
            <b id="dashLunas">...</b><span>Lunas Barang</span>
          </div>
        </div>
      </div>
    </div>

    <div class="menu-container">
      <div class="section-title">Menu Utama</div>
      <div class="menu-grid">
        <a href="setoran.html" class="menu-item"
          ><div class="menu-box"><i class="fas fa-wallet"></i></div>
          <span>Setoran</span></a
        >
        <a href="daftar.html" class="menu-item"
          ><div class="menu-box"><i class="fas fa-user-plus"></i></div>
          <span>Daftar</span></a
        >
        <a href="cekStatus.html" class="menu-item"
          ><div class="menu-box"><i class="fas fa-search"></i></div>
          <span>Cek Status</span></a
        >
        <a href="rekap.html" class="menu-item"
          ><div class="menu-box"><i class="fas fa-clipboard-list"></i></div>
          <span>Rekap</span></a
        >
        <a href="barang.html" class="menu-item"
          ><div class="menu-box"><i class="fas fa-box-open"></i></div>
          <span>Barang</span></a
        >
        <a href="paket.html" class="menu-item"
          ><div class="menu-box"><i class="fas fa-boxes"></i></div>
          <span>Master Paket</span></a
        >
        <a href="admin-mitra.html" class="menu-item"
          ><div class="menu-box"><i class="fas fa-handshake"></i></div>
          <span>Mitra</span></a
        >
        <a href="transaksi.html" class="menu-item"
          ><div
            class="menu-box"
            style="background: #25251a; border-color: var(--primary)"
          >
            <i class="fas fa-history" style="color: var(--primary)"></i>
          </div>
          <span style="color: var(--primary); font-weight: bold"
            >Transaksi</span
          ></a
        >
      </div>
    </div>

    <div class="paket-container">
      <div
        class="section-title"
        style="padding: 0; margin-top: 10px; display: block"
      >
        <div style="margin-bottom: 8px">STATISTIK & FILTER PESERTA</div>

        <div class="filter-group">
          <select
            id="filterSetoran"
            class="filter-select-normal"
            onchange="renderPaketList()"
          >
            <option value="ALL">🎯 Semua Jumlah Setoran</option>
            <option value="0-50">0 - 50x Setor</option>
            <option value="51-100">51 - 100x Setor</option>
            <option value="101-150">101 - 150x Setor</option>
            <option value="151-200">151 - 200x Setor</option>
            <option value="201-9999">> 200x Setor</option>
          </select>

          <div class="grid-2">
            <div class="cs-wrap" id="wrapMitra">
              <div
                class="cs-header"
                id="headMitra"
                onclick="toggleDrop('listMitra')"
              >
                Mitra: Semua <i class="fas fa-caret-down"></i>
              </div>
              <div class="cs-list" id="listMitra"></div>
            </div>
            <div class="cs-wrap" id="wrapPaket">
              <div
                class="cs-header"
                id="headPaket"
                onclick="toggleDrop('listPaket')"
              >
                Paket: Semua <i class="fas fa-caret-down"></i>
              </div>
              <div class="cs-list" id="listPaket"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="paket-list" id="paketList">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

    <div id="modalDetail" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Detail Peserta</h3>
          <i class="fas fa-times close-btn" onclick="tutupModal()"></i>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      let rawPaketData = {};
      let globalPaketData = {};

      const setGreeting = () => {
        const hour = new Date().getHours();
        let greet = "Selamat Pagi";
        if (hour >= 11) greet = "Selamat Siang";
        if (hour >= 15) greet = "Selamat Sore";
        if (hour >= 19) greet = "Selamat Malam";
        document.getElementById("greetingText").innerText = greet + ", Admin";
      };

      async function loadDashboard() {
        const dashUang = document.getElementById("dashUang");
        const pktList = document.getElementById("paketList");

        dashUang.style.opacity = "0.5";

        try {
          const data = await fetchData("getAdminStats");

          if (data) {
            dashUang.innerText = formatRupiah(data.uang || 0);
            document.getElementById("dashPeserta").innerText =
              data.peserta || 0;
            document.getElementById("dashLunas").innerText =
              data.lunasBarang || 0;

            rawPaketData = data.paketBreakdown || {};

            // Build Checkbox Filters dynamically
            populateFilters();

            // Execute render list
            renderPaketList();
          }
        } catch (error) {
          dashUang.innerText = "Rp 0";
          document.getElementById("dashPeserta").innerText = "0";
          document.getElementById("dashLunas").innerText = "0";
          pktList.innerHTML =
            '<div style="text-align:center; padding:20px; color:#ff4444;">Gagal memuat data. Pastikan Deploy Versi Baru!</div>';
        } finally {
          dashUang.style.opacity = "1";
        }
      }

      // ===============================================
      // FUNGSI MULTI-SELECT DROPDOWN
      // ===============================================
      function toggleDrop(idList) {
        // Tutup semua dulu
        const allLists = document.querySelectorAll(".cs-list");
        allLists.forEach((l) => {
          if (l.id !== idList) l.classList.remove("show");
        });
        // Buka yang di klik
        document.getElementById(idList).classList.toggle("show");
      }

      // Tutup dropdown jika klik di luar area
      document.addEventListener("click", function (e) {
        if (!e.target.closest(".cs-wrap")) {
          document
            .querySelectorAll(".cs-list")
            .forEach((l) => l.classList.remove("show"));
        }
      });

      function populateFilters() {
        const mitraSet = new Set();
        const paketSet = new Set();

        for (let pkt in rawPaketData) {
          paketSet.add(pkt);
          rawPaketData[pkt].forEach((p) => {
            let m = (p.mitra || "Pusat").trim();
            if (
              m.toLowerCase() === "pusat" ||
              m.toLowerCase() === "pusat (langsung)"
            )
              m = "Pusat";
            p.mitra = m;
            mitraSet.add(m);
          });
        }

        // Inject Mitra
        const boxMitra = document.getElementById("listMitra");
        boxMitra.innerHTML = "";
        Array.from(mitraSet)
          .sort()
          .forEach((m) => {
            boxMitra.innerHTML += `<label><input type="checkbox" class="chk-mitra" value="${m}" onchange="renderPaketList()"> ${m}</label>`;
          });

        // Inject Paket
        const boxPaket = document.getElementById("listPaket");
        boxPaket.innerHTML = "";
        Array.from(paketSet)
          .sort()
          .forEach((p) => {
            boxPaket.innerHTML += `<label><input type="checkbox" class="chk-paket" value="${p}" onchange="renderPaketList()"> ${p}</label>`;
          });
      }

      // ===============================================
      // FUNGSI RENDER LIST (DENGAN FILTER GABUNGAN)
      // ===============================================
      function renderPaketList() {
        const valSetoran = document.getElementById("filterSetoran").value;

        // Ambil semua centangan yang dipilih
        const arrMitra = Array.from(
          document.querySelectorAll(".chk-mitra:checked"),
        ).map((el) => el.value);
        const arrPaket = Array.from(
          document.querySelectorAll(".chk-paket:checked"),
        ).map((el) => el.value);

        // Update Teks Judul Dropdown
        const headMitra = document.getElementById("headMitra");
        const headPaket = document.getElementById("headPaket");

        if (arrMitra.length > 0) {
          headMitra.innerHTML = `Mitra (${arrMitra.length}) <i class="fas fa-caret-down"></i>`;
          headMitra.classList.add("has-val");
        } else {
          headMitra.innerHTML = `Mitra: Semua <i class="fas fa-caret-down"></i>`;
          headMitra.classList.remove("has-val");
        }

        if (arrPaket.length > 0) {
          headPaket.innerHTML = `Paket (${arrPaket.length}) <i class="fas fa-caret-down"></i>`;
          headPaket.classList.add("has-val");
        } else {
          headPaket.innerHTML = `Paket: Semua <i class="fas fa-caret-down"></i>`;
          headPaket.classList.remove("has-val");
        }

        // Tentukan Range Setoran
        let min = 0,
          max = 99999;
        if (valSetoran !== "ALL") {
          let parts = valSetoran.split("-");
          min = parseInt(parts[0]);
          max = parseInt(parts[1]);
        }

        globalPaketData = {};
        const container = document.getElementById("paketList");
        container.innerHTML = "";

        let hasData = false;

        // Loop dan saring
        for (let pkt in rawPaketData) {
          // Jika Filter Paket diisi, dan paket ini tidak ada di daftar centangan, SKIP!
          if (arrPaket.length > 0 && !arrPaket.includes(pkt)) continue;

          let filteredPeserta = rawPaketData[pkt].filter((p) => {
            let freqOk = (p.freq || 0) >= min && (p.freq || 0) <= max;
            // Jika Mitra Kosong = Anggap Centang Semua
            let mitraOk = arrMitra.length === 0 || arrMitra.includes(p.mitra);

            return freqOk && mitraOk;
          });

          if (filteredPeserta.length > 0) {
            hasData = true;
            globalPaketData[pkt] = filteredPeserta;

            container.innerHTML += `
              <div class="paket-item" onclick="bukaModal('${pkt}')">
                <span>${pkt}</span>
                <b>${filteredPeserta.length} Orang <i class="fas fa-chevron-right"></i></b>
              </div>
            `;
          }
        }

        if (!hasData) {
          container.innerHTML =
            "<div style='color:#888; text-align:center; padding:30px; border:1px dashed #333; border-radius:12px;'>Tidak ada peserta yang cocok dengan kriteria filter tersebut.</div>";
        }
      }

      function bukaModal(paketName) {
        document.getElementById("modalTitle").innerText = paketName;
        const body = document.getElementById("modalBody");
        body.innerHTML = "";

        const listPeserta = globalPaketData[paketName];

        if (listPeserta && listPeserta.length > 0) {
          listPeserta.forEach((p, index) => {
            body.innerHTML += `
            <div class="detail-item" id="peserta-${p.id}">
              <div class="detail-info">
                <h4><span style="color:#aaa;">${index + 1}.</span> ${p.nama}</h4>
                <span><i class="far fa-id-badge"></i> ${p.id}</span>
              </div>
              
              <div style="display:flex; align-items:center;">
                  <div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px;">
                    <span class="badge-freq"><i class="fas fa-coins"></i> ${p.freq || 0}x Setor</span>
                    <span class="badge-mitra"><i class="fas fa-handshake"></i> ${p.mitra}</span>
                  </div>
                  
                  <button onclick="hapusPeserta('${p.id}', '${p.nama}')" class="btn-delete" title="Hapus Peserta">
                      <i class="fas fa-trash-alt"></i>
                  </button>
              </div>
            </div>`;
          });
        } else {
          body.innerHTML =
            '<div style="text-align:center; color:#888;">Data tidak ditemukan.</div>';
        }

        document.getElementById("modalDetail").style.display = "flex";
      }

      function tutupModal() {
        document.getElementById("modalDetail").style.display = "none";
      }

      async function hapusPeserta(id, nama) {
        const konfirmasi = confirm(
          `⚠️ PERINGATAN KERAS!\n\nYakin ingin menghapus peserta:\nNama: ${nama}\nID: ${id} \n\nData peserta dan rincian belanjaannya akan hilang secara permanen!`,
        );

        if (!konfirmasi) return;

        const btn = document.querySelector(`#peserta-${id} button`);
        if (btn) {
          btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
          btn.disabled = true;
        }

        const res = await fetchData("hapusPeserta", { id: id }, "POST");

        if (res && res.success) {
          alert(`✅ Peserta ${nama} berhasil dihapus dari sistem!`);
          tutupModal();
          loadDashboard();
        } else {
          alert("Gagal menghapus: " + (res ? res.error : "Koneksi terputus"));
          if (btn) {
            btn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            btn.disabled = false;
          }
        }
      }

      window.onclick = function (event) {
        const modal = document.getElementById("modalDetail");
        if (event.target == modal) {
          modal.style.display = "none";
        }
      };

      function logout() {
        if (confirm("Keluar dari panel Admin?")) {
          window.location.href = "login.html";
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        setGreeting();
        loadDashboard();
      });
    </script>
  </body>
</html>
