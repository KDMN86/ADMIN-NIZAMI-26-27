<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Riwayat Transaksi</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #ffd700;
        --bg: #121212;
        --surface: #1e1e1e;
        --text: #e0e0e0;
        --border: #333;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        margin: 0;
        padding-bottom: 30px;
      }

      /* HEADER & SEARCH */
      header {
        background: rgba(18, 18, 18, 0.95);
        backdrop-filter: blur(5px);
        padding: 15px;
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid var(--border);
      }
      .header-top {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 15px;
      }
      .back-btn {
        background: #333;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        flex-shrink: 0;
      }
      .header-title {
        flex-grow: 1;
        font-weight: 600;
        font-size: 1.1rem;
        color: #fff;
        margin: 0;
      }

      /* FILTER SECTION */
      .filter-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .filter-row {
        display: flex;
        gap: 10px;
      }
      .filter-input {
        width: 100%;
        padding: 10px 15px;
        border-radius: 10px;
        border: 1px solid #444;
        background: #222;
        color: white;
        outline: none;
        font-size: 0.9rem;
        box-sizing: border-box;
      }
      .filter-input:focus {
        border-color: var(--primary);
      }
      select.filter-input {
        appearance: none;
        background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffd700%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.4-12.8z%22%2F%3E%3C%2Fsvg%3E");
        background-repeat: no-repeat;
        background-position: right 15px top 50%;
        background-size: 12px auto;
        padding-right: 30px;
      }

      /* VIEW TOGGLE */
      .view-tabs {
        display: flex;
        background: #222;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 5px;
        border: 1px solid #444;
      }
      .tab-btn {
        flex: 1;
        padding: 10px;
        background: transparent;
        color: #888;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.9rem;
        transition: 0.2s;
      }
      .tab-btn.active {
        background: var(--primary);
        color: #000;
      }

      /* SUMMARY BAR */
      .summary-bar {
        background: rgba(255, 215, 0, 0.1);
        border: 1px solid rgba(255, 215, 0, 0.3);
        padding: 12px 15px;
        border-radius: 10px;
        margin: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .summary-title {
        font-size: 0.8rem;
        color: var(--primary);
      }
      .summary-value {
        font-size: 1.1rem;
        font-weight: bold;
        color: #4caf50;
      }

      /* CONTAINER & CARD */
      #containerList {
        padding: 0 15px 15px 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      /* KARTU TRANSAKSI FLAT (TERBARU) */
      .trx-flat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .flat-item {
        padding: 12px 15px;
        border-bottom: 1px solid #2a2a2a;
      }
      .flat-item:last-child {
        border-bottom: none;
      }
      .flat-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 5px;
      }
      .flat-name {
        color: var(--primary);
        font-weight: 600;
        font-size: 0.95rem;
      }
      .flat-date {
        font-size: 0.75rem;
        color: #aaa;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .flat-meta {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 8px;
      }

      /* KARTU PER PESERTA (GROUP) */
      .trx-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 15px;
        position: relative;
        overflow: hidden;
      }
      .trx-card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: var(--primary);
      }
      .trx-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .trx-header h4 {
        margin: 0;
        font-size: 1.05rem;
        color: #fff;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .badge-id {
        background: #333;
        color: #ccc;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: normal;
        width: fit-content;
      }
      .badge-mitra {
        background: rgba(255, 215, 0, 0.1);
        color: var(--primary);
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 0.75rem;
        border: 1px solid rgba(255, 215, 0, 0.3);
      }
      .trx-paket {
        font-size: 0.85rem;
        color: #aaa;
        margin-top: 10px;
        display: block;
      }
      .trx-history {
        background: #151515;
        padding: 12px;
        border-radius: 8px;
        margin: 12px 0;
        border: 1px solid #2a2a2a;
        max-height: 300px; /* Diperbesar sedikit agar history terlihat lega */
        overflow-y: auto;
      }
      .th-title {
        font-size: 0.75rem;
        color: #888;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: bold;
      }
      .h-item {
        border-bottom: 1px dashed #333;
        padding-bottom: 8px;
        margin-bottom: 8px;
      }
      .h-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
        margin-bottom: 0;
      }
      .h-detail {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        color: #fff;
      }
      .h-amount {
        color: #4caf50;
        font-weight: 600;
      }

      /* FOOTER / TOTAL */
      .trx-footer {
        display: flex;
        flex-direction: column;
        gap: 6px;
        background: #1a1a1a;
        padding: 12px;
        border-radius: 8px;
        border: 1px dashed #444;
      }
      .f-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
      }
      .f-row span:first-child {
        color: #888;
      }
      .f-row span:last-child {
        color: #ddd;
        font-weight: 600;
      }
      .f-row.total span:last-child {
        color: #4caf50;
        font-size: 1rem;
      }
      .f-row.admin span:last-child {
        color: #ff5252;
      }

      /* EMPTY STATE */
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #aaa;
        line-height: 1.5;
      }
      .empty-state i {
        font-size: 3rem;
        margin-bottom: 15px;
        opacity: 0.5;
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-top">
        <a href="index.html" class="back-btn"
          ><i class="fas fa-arrow-left"></i
        ></a>
        <h2 class="header-title">Data Transaksi</h2>
        <div
          onclick="initData()"
          style="color: var(--primary); cursor: pointer"
          title="Sinkron Ulang"
        >
          <i class="fas fa-sync-alt"></i>
        </div>
      </div>

      <div class="filter-container">
        <div class="filter-row">
          <input
            type="text"
            id="cari"
            class="filter-input"
            placeholder="🔍 Cari Peserta / ID..."
            oninput="applyFilters()"
            autocomplete="off"
          />
          <select
            id="filterMitra"
            class="filter-input"
            onchange="applyFilters()"
          >
            <option value="">Semua Mitra</option>
          </select>
        </div>

        <div class="filter-row">
          <input
            type="date"
            id="startDate"
            class="filter-input"
            onchange="applyFilters()"
            title="Dari Tanggal"
          />
          <input
            type="date"
            id="endDate"
            class="filter-input"
            onchange="applyFilters()"
            title="Sampai Tanggal"
          />
        </div>

        <div class="view-tabs">
          <button
            id="btnViewLatest"
            class="tab-btn active"
            onclick="setViewMode('latest')"
          >
            Semua Transaksi
          </button>
          <button
            id="btnViewGroup"
            class="tab-btn"
            onclick="setViewMode('group')"
          >
            Per Peserta
          </button>
        </div>
      </div>
    </header>

    <div id="summaryContainer"></div>
    <div id="containerList">
      <div class="empty-state">
        <i class="fas fa-spinner fa-spin"></i><br />
        Memuat database transaksi...
      </div>
    </div>

    <script src="script.js"></script>

    <script>
      let rawData = [];
      let filteredData = [];
      let currentViewMode = "latest";

      // ==========================================
      // 1. INISIALISASI DATA AWAL
      // ==========================================
      async function initData() {
        const container = document.getElementById("containerList");
        container.innerHTML =
          '<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><br>Memuat database transaksi...</div>';

        const res = await fetchData("getTransaksi");
        if (res && res.length > 0) {
          // --- PREPROCESSING START ---
          // Kita urutkan data dari yang TERLAMA ke TERBARU untuk menghitung urutan transaksi yang logis
          let chronologicalData = [...res].reverse();
          let pStats = {}; // Wadah penyimpanan sementara untuk menghitung akumulasi per peserta

          chronologicalData.forEach((t) => {
            if (!pStats[t.id]) {
              pStats[t.id] = { count: 0, totalQty: 0 };
            }
            // Tambah hitungan setiap kali orang tersebut setor
            pStats[t.id].count++;
            pStats[t.id].totalQty += Number(t.qty) || 0;

            // Simpan data perhitungan ke dalam objek transaksi
            t.trxSequence = pStats[t.id].count; // Ini akan jadi Setoran Ke-1, Ke-2, dst
            t.akumulasiQty = pStats[t.id].totalQty; // Ini total keseluruhan setoran yang sudah masuk
          });

          // Kembalikan lagi datanya ke urutan TERBARU ke TERLAMA untuk ditampilkan di UI
          rawData = chronologicalData.reverse();
          // --- PREPROCESSING END ---

          populateMitraDropdown();
          applyFilters();
        } else {
          container.innerHTML =
            '<div class="empty-state"><i class="fas fa-folder-open"></i><br>Belum ada riwayat transaksi sama sekali.</div>';
          document.getElementById("summaryContainer").innerHTML = "";
        }
      }

      // ==========================================
      // 2. LOGIKA PARSING TANGGAL & DROPDOWN MITRA
      // ==========================================
      function parseIndoDate(dateStr) {
        if (!dateStr) return new Date(0);
        let parts = dateStr.split(", ");
        if (parts.length < 2) return new Date(dateStr);
        let dateParts = parts[0].split("/");
        return new Date(
          `${dateParts[2]}-${dateParts[1]}-${dateParts[0]}T00:00:00`,
        );
      }

      function populateMitraDropdown() {
        const select = document.getElementById("filterMitra");
        select.innerHTML = '<option value="">Semua Mitra</option>';

        let mitras = new Set();
        rawData.forEach((t) => {
          if (t.mitra) mitras.add(t.mitra.trim());
        });

        Array.from(mitras)
          .sort()
          .forEach((m) => {
            let opt = document.createElement("option");
            opt.value = m.toLowerCase();
            opt.textContent = m;
            select.appendChild(opt);
          });
      }

      // ==========================================
      // 3. LOGIKA FILTERING UTAMA
      // ==========================================
      function applyFilters() {
        const cariText = document
          .getElementById("cari")
          .value.toLowerCase()
          .trim();
        const mitraVal = document
          .getElementById("filterMitra")
          .value.toLowerCase();
        const startVal = document.getElementById("startDate").value;
        const endVal = document.getElementById("endDate").value;

        let startD = startVal ? new Date(startVal + "T00:00:00") : null;
        let endD = endVal ? new Date(endVal + "T23:59:59") : null;

        filteredData = rawData.filter((t) => {
          let matchText = true;
          let matchMitra = true;
          let matchDate = true;

          if (cariText) {
            matchText =
              (t.nama || "").toLowerCase().includes(cariText) ||
              (t.id || "").toLowerCase().includes(cariText);
          }

          if (mitraVal) {
            matchMitra = (t.mitra || "Pusat").toLowerCase().includes(mitraVal);
          }

          if (startD || endD) {
            let trxDate = parseIndoDate(t.waktu);
            if (startD && trxDate < startD) matchDate = false;
            if (endD && trxDate > endD) matchDate = false;
          }

          return matchText && matchMitra && matchDate;
        });

        renderTampilan();
      }

      // ==========================================
      // 4. RENDER UI BERDASARKAN MODE
      // ==========================================
      function setViewMode(mode) {
        currentViewMode = mode;
        document
          .getElementById("btnViewLatest")
          .classList.toggle("active", mode === "latest");
        document
          .getElementById("btnViewGroup")
          .classList.toggle("active", mode === "group");
        renderTampilan();
      }

      function renderTampilan() {
        const container = document.getElementById("containerList");
        const summaryCont = document.getElementById("summaryContainer");

        if (filteredData.length === 0) {
          summaryCont.innerHTML = "";
          container.innerHTML =
            '<div class="empty-state"><i class="fas fa-box-open" style="color:#ff5252;"></i><br>Data transaksi tidak ditemukan.</div>';
          return;
        }

        let totalUangKotor = 0;
        let totalTransaksi = filteredData.length;
        filteredData.forEach((t) => (totalUangKotor += Number(t.kotor) || 0));

        summaryCont.innerHTML = `
          <div class="summary-bar">
            <div>
              <div class="summary-title">Total Filter (${totalTransaksi} Trx)</div>
            </div>
            <div class="summary-value">+ ${formatRupiah(totalUangKotor)}</div>
          </div>
        `;

        if (currentViewMode === "latest") {
          renderListTerbaru();
        } else {
          renderListGrup();
        }
      }

      // --- RENDER MODE TERBARU (FLAT LIST) ---
      function renderListTerbaru() {
        const container = document.getElementById("containerList");
        let html = '<div class="trx-flat-card">';

        filteredData.forEach((h) => {
          // Logika Tampilan:
          // Jika ini transaksi ke-1, tampilkan "Setoran Ke-1 (Jml: Nx)"
          // Jika ini transaksi ke-2 dst, tambahkan keterangan "Total Akumulasi" di bawahnya.
          html += `
            <div class="flat-item">
              <div class="flat-header">
                <span class="flat-name">${h.nama} <span style="font-size:0.7rem; color:#888;">(${h.id})</span></span>
                <span class="flat-date"><i class="far fa-clock"></i> ${h.waktu}</span>
              </div>
              <div class="flat-meta">
                ${h.paket} • <i class="fas fa-handshake"></i> ${h.mitra || "Pusat"}
              </div>
              <div class="h-detail" style="align-items: flex-start;">
                <div style="display:flex; flex-direction:column; gap:4px;">
                  <span>Setoran Ke-${h.trxSequence} (Jml: ${h.qty}x)</span>
                  ${h.trxSequence > 1 ? `<span style="font-size:0.75rem; color:#aaa;"><i class="fas fa-chart-line"></i> Total Terkumpul: ${h.akumulasiQty}x</span>` : ""}
                </div>
                <span class="h-amount" style="white-space:nowrap;">+ ${formatRupiah(h.kotor)}</span>
              </div>
            </div>
          `;
        });

        html += "</div>";
        container.innerHTML = html;
      }

      // --- RENDER MODE PER PESERTA (GROUPED) ---
      function renderListGrup() {
        const container = document.getElementById("containerList");

        const map = {};
        filteredData.forEach((t) => {
          if (!map[t.id]) {
            map[t.id] = {
              id: t.id,
              nama: t.nama,
              mitra: t.mitra,
              paket: t.paket,
              totalKotor: 0,
              totalAdmin: 0,
              totalBersih: 0,
              history: [],
            };
          }
          map[t.id].totalKotor += Number(t.kotor) || 0;
          map[t.id].totalAdmin += Number(t.admin) || 0;
          map[t.id].totalBersih += Number(t.bersih) || 0;
          map[t.id].history.push(t);
        });

        let dataGrouped = Object.values(map);
        let html = "";

        dataGrouped.forEach((p) => {
          let historyHtml = "";
          p.history.forEach((h) => {
            historyHtml += `
            <div class="h-item">
                <div class="flat-date" style="margin-bottom:4px;"><i class="far fa-clock"></i> ${h.waktu}</div>
                <div class="h-detail" style="align-items: flex-start;">
                    <div style="display:flex; flex-direction:column; gap:4px;">
                      <span>Setoran Ke-${h.trxSequence} (Jml: ${h.qty}x)</span>
                      ${h.trxSequence > 1 ? `<span style="font-size:0.75rem; color:#888;"><i class="fas fa-chart-line"></i> Total Terkumpul: ${h.akumulasiQty}x</span>` : ""}
                    </div>
                    <span class="h-amount" style="white-space:nowrap;">+ ${formatRupiah(h.kotor)}</span>
                </div>
            </div>`;
          });

          let adminRow = "";
          if (p.totalAdmin > 0) {
            adminRow = `<div class="f-row admin"><span>Total Potongan Admin</span><span>- ${formatRupiah(p.totalAdmin)}</span></div>`;
          }

          html += `
          <div class="trx-card">
            <div class="trx-header">
              <h4>${p.nama} <span class="badge-id">${p.id}</span></h4>
              <span class="badge-mitra"><i class="fas fa-handshake"></i> ${p.mitra || "Pusat"}</span>
            </div>
            <span class="trx-paket">${p.paket}</span>

            <div class="trx-history">
              <div class="th-title">Rincian Transaksi (${p.history.length}x):</div>
              ${historyHtml}
            </div>

            <div class="trx-footer">
              <div class="f-row"><span>Total Masuk (Kotor)</span><span>${formatRupiah(p.totalKotor)}</span></div>
              ${adminRow}
              <div class="f-row total"><span>Total Saldo Aktif</span><span>${formatRupiah(p.totalBersih)}</span></div>
            </div>
          </div>`;
        });

        container.innerHTML = html;
      }

      document.addEventListener("DOMContentLoaded", initData);
    </script>
  </body>
</html>
