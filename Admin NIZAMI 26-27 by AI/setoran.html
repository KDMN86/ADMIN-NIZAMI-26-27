<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Setoran Massal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
      :root {
        --primary: #ffd700;
        --bg: #121212;
        --surface: #1e1e1e;
        --text: #e0e0e0;
        --border: #333;
      }
      * {
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        padding: 0;
        margin: 0;
        padding-bottom: 300px;
      }

      /* HEADER & SEARCH BAR */
      header {
        background: rgba(18, 18, 18, 0.95);
        backdrop-filter: blur(5px);
        padding: 15px;
        position: sticky;
        top: 0;
        z-index: 50;
        border-bottom: 1px solid var(--border);
      }
      .header-top {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }
      .back-btn {
        background: #333;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        flex-shrink: 0;
      }
      .search-bar {
        width: 100%;
        padding: 12px 20px;
        border-radius: 15px;
        border: 1px solid #444;
        background: #222;
        color: white;
        outline: none;
        font-size: 1rem;
      }
      .search-bar:focus {
        border-color: var(--primary);
      }
      .filter-select {
        appearance: none;
        background: #222
          url('data:image/svg+xml;utf8,<svg fill="white" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>')
          no-repeat right 15px center;
      }

      #containerList {
        padding: 15px;
      }

      /* Tambahkan kode ini ke bagian <style> */
      .wa-extract-container {
        background: var(--surface);
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 10px;
        border: 1px solid var(--primary);
        transition: all 0.3s ease;
      }

      .wa-extract-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
      }

      .wa-extract-header h4 {
        margin: 0;
        color: var(--primary);
      }

      .wa-extract-body {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.3s ease,
          margin-top 0.3s ease;
      }

      .wa-extract-body.show {
        max-height: 250px;
        margin-top: 15px;
      }

      /* CARD STYLE BARU (COMPACT) */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 15px;
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition: 0.2s;
        position: relative;
        overflow: hidden;
      }
      .card.active {
        border: 1px solid var(--primary);
        background: #25251a;
      }
      .card.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 4px;
        background: var(--primary);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px dashed #333;
        padding-bottom: 8px;
      }
      .card-header h4 {
        margin: 0;
        font-size: 1.05rem;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-header a {
        text-decoration: none;
        transition: 0.2s;
      }
      .card-header a:active h4 {
        color: var(--primary);
      }
      .id-badge {
        font-size: 0.7rem;
        background: #333;
        color: #aaa;
        padding: 2px 6px;
        border-radius: 4px;
        font-weight: normal;
        border: 1px solid #444;
      }

      .badge {
        background: rgba(255, 215, 0, 0.1);
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 0.7rem;
        color: var(--primary);
        border: 1px solid rgba(255, 215, 0, 0.3);
      }
      .badge.clickable {
        cursor: pointer;
        transition: all 0.2s;
      }
      .badge.clickable:active {
        transform: scale(0.95);
        background: var(--primary);
        color: #000;
      }

      .card-body {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .p-stats {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .p-detail {
        font-size: 0.8rem;
        color: #aaa;
      }
      .p-price {
        color: #4caf50;
        font-weight: bold;
        font-size: 0.9rem;
        margin-top: 2px;
      }
      .saldo-badge {
        background: rgba(76, 175, 80, 0.1);
        color: #4caf50;
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: bold;
        display: inline-block;
        width: fit-content;
        margin-top: 3px;
        border: 1px solid rgba(76, 175, 80, 0.2);
      }

      /* COUNTER BOX */
      .counter-box {
        display: flex;
        align-items: center;
        gap: 6px;
        background: #000;
        padding: 6px;
        border-radius: 10px;
        border: 1px solid #333;
      }
      .btn-qty {
        width: 35px;
        height: 35px;
        background: #333;
        border: none;
        color: white;
        border-radius: 8px;
        font-weight: bold;
        font-size: 1.2rem;
        cursor: pointer;
        transition: 0.1s;
      }
      .btn-qty:active {
        transform: scale(0.9);
        background: var(--primary);
        color: #000;
      }
      .input-qty {
        width: 40px;
        text-align: center;
        background: transparent;
        border: none;
        color: var(--primary);
        font-weight: bold;
        font-size: 1.2rem;
        outline: none;
        -moz-appearance: textfield;
      }
      .input-qty::-webkit-outer-spin-button,
      .input-qty::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      /* BOTTOM ACTION & RECAP LIST */
      .bottom-action {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #1a1a1a;
        border-top: 2px solid var(--primary);
        display: flex;
        flex-direction: column;
        z-index: 100;
        box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8);
        border-radius: 20px 20px 0 0;
        transition: all 0.3s ease;
      }

      .recap-header {
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.85rem;
        color: var(--primary);
        font-weight: bold;
        cursor: pointer;
        border-bottom: 1px solid #333;
        text-transform: uppercase;
        letter-spacing: 1px;
        background: #222;
        border-radius: 20px 20px 0 0;
        display: none; /* Disembunyikan saat kosong */
      }

      .recap-list {
        width: 100%;
        max-height: 0; /* Diubah jadi 0 agar default tertutup */
        overflow-y: auto;
        padding: 0 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition:
          max-height 0.3s ease,
          padding 0.3s ease;
      }

      .recap-list.show {
        max-height: 35vh; /* Akan terbuka saat diklik */
        padding: 15px 20px 5px 20px;
      }

      .recap-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.85rem;
        color: #ccc;
        border-bottom: 1px dashed #333;
        padding-bottom: 8px;
      }
      .recap-item b {
        color: #fff;
      }

      .action-row {
        width: 100%;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .total-box small {
        display: block;
        color: #888;
        font-size: 0.8rem;
      }
      .total-val {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--primary);
      }
      .btn-save {
        background: var(--primary);
        color: #000;
        font-weight: bold;
        padding: 12px 25px;
        border-radius: 30px;
        border: none;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s;
      }
      .btn-save:active {
        transform: scale(0.95);
      }
      .btn-save:disabled {
        background: #444;
        color: #888;
        cursor: not-allowed;
      }

      /* STRUK */
      #receiptArea {
        position: fixed;
        top: -9999px;
        left: -9999px;
        width: 380px;
        background: #fff;
        color: #000;
        padding: 25px;
        font-family: "Courier New", monospace;
      }
      .r-header {
        text-align: center;
        border-bottom: 2px dashed #000;
        padding-bottom: 15px;
        margin-bottom: 15px;
      }
      .r-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 14px;
      }
      .r-total {
        border-top: 2px dashed #000;
        margin-top: 15px;
        padding-top: 10px;
        font-weight: bold;
        font-size: 16px;
      }

      #modalResult {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.95);
        z-index: 200;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-align: center;
      }
      #previewImg img {
        max-width: 100%;
        height: auto;
        max-height: 45vh;
        border: 5px solid #fff;
        border-radius: 5px;
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-top">
        <a href="index.html" class="back-btn"
          ><i class="fas fa-arrow-left"></i
        ></a>
        <input
          type="text"
          id="cari"
          class="search-bar"
          placeholder="🔍 Cari No Anggota / Nama / ID..."
          oninput="filterLokal()"
          autocomplete="off"
        />
      </div>

      <div class="wa-extract-container">
        <div class="wa-extract-header" onclick="toggleWaExtract()">
          <h4><i class="fab fa-whatsapp"></i> Ekstrak Pesan WA Mitra</h4>
          <i
            class="fas fa-chevron-down"
            id="waToggleIcon"
            style="color: var(--primary)"
          ></i>
        </div>

        <div class="wa-extract-body" id="waExtractBody">
          <textarea
            id="waPasteArea"
            placeholder="Tempel (Paste) pesan WA dari mitra di sini..."
            style="
              width: 100%;
              height: 80px;
              background: #252525;
              color: #fff;
              border: 1px solid #444;
              border-radius: 8px;
              padding: 10px;
              font-size: 12px;
            "
          ></textarea>
          <button
            onclick="prosesEkstrakWA()"
            style="
              width: 100%;
              margin-top: 10px;
              padding: 10px;
              background: var(--primary);
              color: #000;
              border: none;
              border-radius: 8px;
              font-weight: bold;
              cursor: pointer;
            "
          >
            <i class="fas fa-magic"></i> Proses & Masukkan ke Daftar
          </button>
        </div>
      </div>

      <select
        id="filterMitra"
        class="search-bar filter-select"
        onchange="filterLokal()"
      >
        <option value="">📁 Tampilkan Semua Mitra</option>
      </select>
    </header>

    <div id="containerList">
      <div style="text-align: center; color: #888; margin-top: 60px">
        <i
          class="fas fa-spinner fa-spin"
          style="font-size: 3rem; margin-bottom: 15px; color: var(--primary)"
        ></i>
        <p>Memuat database peserta...</p>
      </div>
    </div>

    <div class="bottom-action" id="bottomAction">
      <div class="recap-header" id="recapHeader" onclick="toggleRecap()">
        <span
          ><i class="fas fa-clipboard-check"></i> Daftar Rekap (<span
            id="recapCountBadge"
            >0</span
          >)</span
        >
        <i class="fas fa-chevron-up" id="recapToggleIcon"></i>
      </div>

      <div id="recapList" class="recap-list"></div>

      <div class="action-row">
        <div class="total-box">
          <small id="countItem">0 Transaksi</small>
          <div class="total-val" id="totalMoney">Rp 0</div>
        </div>
        <button
          class="btn-save"
          id="btnProses"
          onclick="prosesSemua()"
          disabled
        >
          PROSES <i class="fas fa-print"></i>
        </button>
      </div>
    </div>

    <div id="receiptArea">
      <div class="r-header">
        <h2 style="margin: 0">NIZAMI 2026</h2>
        <span>BUKTI SETORAN TABUNGAN</span><br />
        <span id="rDate" style="font-size: 12px">-</span>
      </div>
      <div id="rItems"></div>
      <div class="r-row r-total">
        <span>TOTAL DISETOR</span>
        <span id="rGrandTotal">Rp 0</span>
      </div>
      <div style="text-align: center; margin-top: 30px; font-size: 12px">
        Terima Kasih<br />Admin Nizami
      </div>
    </div>

    <div id="modalResult">
      <h3 style="color: var(--primary); margin: 0">Transaksi Berhasil!</h3>
      <small style="color: #aaa; margin-top: 5px; display: block"
        >Kirim bukti rekap ke Mitra atau simpan struknya</small
      >
      <div id="previewImg"></div>

      <div
        style="
          display: flex;
          flex-direction: column;
          gap: 10px;
          width: 100%;
          max-width: 350px;
        "
      >
        <button
          onclick="kirimWaMitra()"
          class="btn-save"
          style="
            width: 100%;
            justify-content: center;
            background: #25d366;
            color: #fff;
            padding: 15px;
            font-size: 1.05rem;
          "
        >
          <i class="fab fa-whatsapp" style="font-size: 1.3rem"></i> KIRIM REKAP
          KE WA MITRA
        </button>
        <div style="display: flex; gap: 10px">
          <button
            onclick="downloadBukti()"
            class="btn-save"
            style="
              flex: 1;
              justify-content: center;
              background: #333;
              color: #fff;
            "
          >
            <i class="fas fa-download"></i> SIMPAN
          </button>
          <button
            onclick="location.reload()"
            class="btn-save"
            style="
              flex: 1;
              justify-content: center;
              background: #1a1a1a;
              color: #aaa;
              border: 1px solid #444;
            "
          >
            TUTUP
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      let semuaPeserta = [];
      let cart = {};

      document.addEventListener("DOMContentLoaded", async () => {
        const res = await fetchData("cariPeserta", { q: "" });
        if (res && res.length > 0) {
          semuaPeserta = res.map((p) => {
            let m = (p.mitra || "").trim();
            if (
              m === "" ||
              m.toLowerCase() === "pusat" ||
              m.toLowerCase() === "pusat (langsung)"
            ) {
              p.mitra = "Pusat";
            }
            return p;
          });

          buatDropdownMitra();
          renderList(semuaPeserta);
        } else {
          document.getElementById("containerList").innerHTML =
            '<div style="text-align:center; padding:20px;">Data kosong atau gagal dimuat.</div>';
        }
      });

      // FUNGSI UNTUK MEMBUKA/TUTUP KOTAK EKSTRAK WA
      function toggleWaExtract() {
        const body = document.getElementById("waExtractBody");
        const icon = document.getElementById("waToggleIcon");

        if (body.classList.contains("show")) {
          body.classList.remove("show");
          icon.classList.replace("fa-chevron-up", "fa-chevron-down");
        } else {
          body.classList.add("show");
          icon.classList.replace("fa-chevron-down", "fa-chevron-up");
        }
      }

      function buatDropdownMitra() {
        const mitras = [...new Set(semuaPeserta.map((p) => p.mitra))].filter(
          Boolean,
        );
        const select = document.getElementById("filterMitra");
        select.innerHTML = '<option value="">📁 Tampilkan Semua Mitra</option>';
        mitras.sort().forEach((m) => {
          select.innerHTML += `<option value="${m}">${m}</option>`;
        });
      }

      function prosesEkstrakWA() {
        const text = document.getElementById("waPasteArea").value;
        if (!text.trim()) {
          alert("Silakan tempel pesan WA terlebih dahulu!");
          return;
        }

        // PERBAIKAN 1: Nama array yang benar adalah semuaPeserta
        if (!semuaPeserta || semuaPeserta.length === 0) {
          alert(
            "⚠️ Data peserta belum termuat! Tunggu loading selesai atau refresh halaman Admin.",
          );
          return;
        }

        const lines = text.split("\n"); // Pisahkan teks per baris
        let count = 0;
        let notFound = [];

        lines.forEach((line) => {
          // 1. Cari pola kurung siku yang berisi ID, contoh: [Budi Santoso 1234]
          let idMatch = line.match(/\[(.*?)\]/);
          if (!idMatch) return; // Jika baris ini tidak punya [...], lewati.

          let idPeserta = idMatch[1].trim().toLowerCase();

          // 2. Cari pola jumlah setoran, contoh: +2x atau + 2 x
          let qtyMatch = line.match(/\+\s*(\d+)\s*[xX]/);
          let qty = qtyMatch ? parseInt(qtyMatch[1]) : 1; // Jika tidak ada angka, anggap 1x

          // 3. Cari ID di database lokal Admin
          let p = semuaPeserta.find(
            (item) => String(item.id).trim().toLowerCase() === idPeserta,
          );

          if (p) {
            // PERBAIKAN 2: Gunakan sistem Cart yang ada di setoran.html
            let currentQty = cart[p.id] ? cart[p.id].qty : 0;
            let newQty = currentQty + qty;

            // Masukkan ke keranjang
            updateCartLogic(p.id, newQty);
            count++;
          } else {
            // Simpan ID yang gagal ditemukan untuk diinfokan ke Admin
            notFound.push(idMatch[1].trim());
          }
        });

        // 4. Berikan Feedback ke Admin
        if (count > 0) {
          alert(`✅ Berhasil mengekstrak ${count} setoran peserta.`);
          document.getElementById("waPasteArea").value = ""; // Bersihkan area

          // PERBAIKAN 3: Render ulang list agar angka di kotak input ikut berubah
          filterLokal();
        } else {
          alert(
            "❌ Tidak ada data yang cocok. Pastikan pesan WA memiliki format [ID].",
          );
        }

        // Jika ada ID yang typo atau belum terdaftar
        if (notFound.length > 0) {
          alert(
            `⚠️ Peringatan: ID berikut ada di pesan WA, tapi TIDAK DITEMUKAN di database Admin:\n\n${notFound.join("\n")}\n\nPastikan ID sesuai, atau reload halaman Admin.`,
          );
        }
      }

      function setMitraFilter(mitraName) {
        const select = document.getElementById("filterMitra");
        select.value = mitraName;
        filterLokal();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function filterLokal() {
        const teks = document.getElementById("cari").value.toLowerCase();
        const mitraTerpilih = document
          .getElementById("filterMitra")
          .value.toLowerCase();

        const hasilFilter = semuaPeserta.filter((p) => {
          const cocokTeks =
            p.nama.toLowerCase().includes(teks) ||
            p.id.toLowerCase().includes(teks) ||
            (p.no_anggota && String(p.no_anggota).toLowerCase().includes(teks));

          const cocokMitra =
            mitraTerpilih === "" ||
            (p.mitra || "").toLowerCase() === mitraTerpilih;
          return cocokTeks && cocokMitra;
        });

        renderList(hasilFilter);
      }

      function renderList(dataArr) {
        const container = document.getElementById("containerList");
        container.innerHTML = "";

        if (dataArr.length === 0) {
          container.innerHTML =
            '<div style="text-align:center; padding:20px; color:#aaa;">Peserta tidak ditemukan.</div>';
          return;
        }

        let html = "";
        dataArr.forEach((p) => {
          const inCart = cart[p.id];
          const qty = inCart ? inCart.qty : 0;
          const activeClass = qty > 0 ? "active" : "";

          let displaySaldo = new Intl.NumberFormat("id-ID", {
            style: "currency",
            currency: "IDR",
            minimumFractionDigits: 0,
          }).format(p.saldo_aktif || 0);
          let displayHarga = new Intl.NumberFormat("id-ID", {
            style: "currency",
            currency: "IDR",
            minimumFractionDigits: 0,
          }).format(p.harga || 0);

          let infoSaldo = "";
          if (p.paket.toLowerCase().includes("uang")) {
            infoSaldo = `<div class="saldo-badge">Saldo Aktif: ${displaySaldo}</div>`;
          }

          let labelNoAnggota = p.no_anggota
            ? `<span class="badge" style="background:#4CAF50; color:white; border:none; padding:2px 6px;">No: ${p.no_anggota}</span>`
            : "";

          html += `
            <div class="card ${activeClass}" id="card-${p.id}">
                <div class="card-header">
                    <a href="kartu-digital.html?id=${p.id}" target="_blank" title="Buka Kartu Digital">
                        <h4>
                            ${p.nama} 
                            ${labelNoAnggota}
                            <span class="id-badge">${p.id}</span>
                        </h4>
                    </a>
                    <span class="badge clickable" onclick="setMitraFilter('${p.mitra}')" title="Tampilkan peserta dari mitra ini">
                        <i class="fas fa-handshake"></i> ${p.mitra}
                    </span>
                </div>
                <div class="card-body">
                    <div class="p-stats">
                        <span class="p-detail" style="color:var(--primary); font-weight:600;">${p.paket}</span>
                        <span class="p-detail">Setoran Sebelumnya: <b style="color:#fff;">${p.freq}x</b></span>
                        <span class="p-price">${displayHarga} <small style="color:#aaa; font-weight:normal;">/setoran</small></span>
                        ${infoSaldo}
                    </div>
                    <div class="counter-box">
                        <button class="btn-qty" onclick="updateQty('${p.id}', -1)">-</button>
                        <input type="number" class="input-qty" id="qty-${p.id}" value="${qty}" oninput="manualInput('${p.id}', this.value)">
                        <button class="btn-qty" onclick="updateQty('${p.id}', 1)">+</button>
                    </div>
                </div>
            </div>`;
        });
        container.innerHTML = html;
      }

      function manualInput(id, valStr) {
        let val = parseInt(valStr);
        if (isNaN(val) || val < 0) val = 0;
        updateCartLogic(id, val);
      }

      function updateQty(id, change) {
        const input = document.getElementById(`qty-${id}`);
        let newVal = parseInt(input.value || 0) + change;
        if (newVal < 0) newVal = 0;
        if (input) input.value = newVal;
        updateCartLogic(id, newVal);
      }

      function updateCartLogic(id, val) {
        const card = document.getElementById(`card-${id}`);
        let pData = semuaPeserta.find((p) => p.id === id);

        if (!pData) return;

        if (val > 0) {
          cart[id] = { qty: val, data: pData };
          if (card) card.classList.add("active");
        } else {
          delete cart[id];
          if (card) card.classList.remove("active");
        }
        updateSummary();
      }

      function updateSummary() {
        let count = 0,
          total = 0;

        let recapHtml =
          '<div style="font-size:0.75rem; color:var(--primary); font-weight:bold; margin-bottom:5px; text-transform:uppercase; letter-spacing:1px;"><i class="fas fa-clipboard-check"></i> Daftar Rekap Setoran:</div>';

        for (let key in cart) {
          const item = cart[key];
          count += item.qty;
          const subtotal = item.qty * item.data.harga;
          total += subtotal;

          let displaySubtotal = new Intl.NumberFormat("id-ID", {
            style: "currency",
            currency: "IDR",
            minimumFractionDigits: 0,
          }).format(subtotal);

          recapHtml += `
            <div class="recap-item">
              <span>${item.data.nama} <small style="color:#aaa; font-weight:bold;">(${item.qty}x)</small></span>
              <b>${displaySubtotal}</b>
            </div>
          `;
        }

        const recapContainer = document.getElementById("recapList");

        if (count > 0) {
          recapContainer.innerHTML = recapHtml;
          recapContainer.style.display = "flex";
        } else {
          recapContainer.style.display = "none";
          recapContainer.innerHTML = "";
        }

        document.getElementById("countItem").innerText =
          Object.keys(cart).length + " Peserta (" + count + "x)";

        document.getElementById("totalMoney").innerText = new Intl.NumberFormat(
          "id-ID",
          { style: "currency", currency: "IDR", minimumFractionDigits: 0 },
        ).format(total);

        const btn = document.getElementById("btnProses");
        btn.disabled = total <= 0;
      }

      async function prosesSemua() {
        if (
          !confirm(
            "Proses setoran sekarang? Pastikan uang yang diterima sudah sesuai.",
          )
        )
          return;

        const btn = document.getElementById("btnProses");
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';
        btn.disabled = true;

        const rList = document.getElementById("rItems");
        rList.innerHTML = "";
        document.getElementById("rDate").innerText = new Date().toLocaleString(
          "id-ID",
        );

        let grandTotal = 0,
          successCount = 0,
          failCount = 0;

        for (let id in cart) {
          const item = cart[id];
          const p = item.data;
          const nominal = item.qty * p.harga;

          if (nominal > 0) {
            try {
              const response = await fetchData(
                "inputSetoran",
                { idPeserta: id, nominal: nominal, qty: item.qty },
                "POST",
              );
              if (response && response.success) {
                // LOGIKA YANG DIKEMBALIKAN: Mencari berdasarkan text titik (".")
                let adminFeePerQty = 0;
                const pNama = p.paket.toLowerCase();

                if (pNama.includes("uang")) {
                  if (pNama.includes("5.000")) adminFeePerQty = 300;
                  else if (pNama.includes("10.000") || pNama.includes("15.000"))
                    adminFeePerQty = 450;
                  else if (pNama.includes("20.000")) adminFeePerQty = 600;
                  else if (pNama.includes("25.000") || pNama.includes("30.000"))
                    adminFeePerQty = 750;
                }

                const totalAdmin = adminFeePerQty * item.qty;
                const nominalBersih = nominal - totalAdmin;
                const saldoAktifBaru = p.saldo_aktif + nominalBersih;

                let rincianAdmin = "";
                if (totalAdmin > 0) {
                  let displayAdmin = new Intl.NumberFormat("id-ID", {
                    style: "currency",
                    currency: "IDR",
                    minimumFractionDigits: 0,
                  }).format(totalAdmin);
                  let displayAktif = new Intl.NumberFormat("id-ID", {
                    style: "currency",
                    currency: "IDR",
                    minimumFractionDigits: 0,
                  }).format(saldoAktifBaru);
                  rincianAdmin = `
                    <div>Potongan Admin: ${displayAdmin}</div>
                    <div style="font-weight:bold; color:#000;">Saldo Aktif: ${displayAktif}</div>`;
                }

                let displayNominal = new Intl.NumberFormat("id-ID", {
                  style: "currency",
                  currency: "IDR",
                  minimumFractionDigits: 0,
                }).format(nominal);
                let displayHarga = new Intl.NumberFormat("id-ID", {
                  style: "currency",
                  currency: "IDR",
                  minimumFractionDigits: 0,
                }).format(p.harga);

                rList.innerHTML += `
                  <div style="margin-bottom:10px; border-bottom:1px dashed #ccc; padding-bottom:8px;">
                      <div class="r-row" style="margin-bottom:2px; font-weight:bold;">
                          <span>${p.nama}</span>
                          <span>${displayNominal}</span>
                      </div>
                      <div style="color:#333; font-size:12px; margin-left:10px; line-height:1.5;">
                          <div>Paket: ${p.paket}</div>
                          <div>Jml Setor: ${item.qty}x @ ${displayHarga}</div>
                          <div>Posisi: Ke-${p.freq} ➔ Ke-${p.freq + item.qty}</div>
                          ${rincianAdmin}
                      </div>
                  </div>`;
                grandTotal += nominal;
                successCount++;
              } else failCount++;
            } catch (e) {
              failCount++;
            }
          }
        }

        document.getElementById("rGrandTotal").innerText =
          new Intl.NumberFormat("id-ID", {
            style: "currency",
            currency: "IDR",
            minimumFractionDigits: 0,
          }).format(grandTotal);

        if (successCount > 0) {
          if (failCount > 0)
            alert(`Peringatan: ${failCount} data gagal disimpan.`);
          const canvas = await html2canvas(
            document.getElementById("receiptArea"),
            { scale: 2 },
          );
          window.currentImgData = canvas.toDataURL("image/png");
          document.getElementById("previewImg").innerHTML =
            `<img src="${window.currentImgData}">`;
          document.getElementById("modalResult").style.display = "flex";
        } else {
          alert(
            "GAGAL! Cek koneksi atau pastikan Script telah di-Deploy ulang.",
          );
          btn.innerHTML = 'PROSES <i class="fas fa-print"></i>';
          btn.disabled = false;
        }
      }

      function downloadBukti() {
        const link = document.createElement("a");
        link.download = "STRUK-NIZAMI-" + Date.now() + ".png";
        link.href = window.currentImgData;
        link.click();
      }

      async function kirimWaMitra() {
        let total = 0;
        let listMitra = new Set();
        let msgRincian = "";

        for (let id in cart) {
          let item = cart[id];
          let sub = item.qty * item.data.harga;
          total += sub;

          let mName = item.data.mitra || "Pusat";
          listMitra.add(mName);

          let displaySub = new Intl.NumberFormat("id-ID", {
            style: "currency",
            currency: "IDR",
            minimumFractionDigits: 0,
          }).format(sub);
          let noAnggotaStr = item.data.no_anggota
            ? `(#${item.data.no_anggota})`
            : "";

          msgRincian += `👤 *${item.data.nama}* ${noAnggotaStr}\n`;
          msgRincian += `📦 ${item.data.paket}\n`;
          msgRincian += `   ↳ ${item.qty}x Setor = ${displaySub}\n\n`;
        }

        let displayTotal = new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          minimumFractionDigits: 0,
        }).format(total);
        let mitraNames = Array.from(listMitra).join(", ");
        let dateNow = new Date().toLocaleString("id-ID");

        let msg = `Halo Mitra *${mitraNames}*, berikut rekap setoran yang baru saja diproses admin:\n\n`;
        msg += `*REKAP BUKTI SETORAN* ✅\nTanggal: ${dateNow}\n\n`;
        msg += msgRincian;
        msg += `*💰 TOTAL DITERIMA: ${displayTotal}*\n\n`;
        msg += `_Gambar struk fisik dapat dilampirkan setelah pesan ini (Tekan Tempel/Paste)._`;

        try {
          const response = await fetch(window.currentImgData);
          const blob = await response.blob();
          await navigator.clipboard.write([
            new ClipboardItem({
              [blob.type]: blob,
            }),
          ]);
          alert(
            "✅ Gambar Struk Berhasil Disalin (Di-Copy)!\n\nSaat WhatsApp terbuka, cukup klik kanan -> Paste (atau CTRL+V) untuk menempelkan gambar struknya di chat.",
          );
        } catch (err) {
          console.log("Browser tidak mendukung copy gambar langsung: ", err);
        }

        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
      }

      // FUNGSI BARU: Buka/Tutup Daftar Rekap Bawah
      function toggleRecap() {
        const list = document.getElementById("recapList");
        const icon = document.getElementById("recapToggleIcon");

        if (list.classList.contains("show")) {
          list.classList.remove("show");
          icon.classList.replace("fa-chevron-down", "fa-chevron-up");
        } else {
          list.classList.add("show");
          icon.classList.replace("fa-chevron-up", "fa-chevron-down");
        }
      }

      // PERBAIKAN FUNGSI updateSummary()
      function updateSummary() {
        let count = 0,
          total = 0;

        let recapHtml = ""; // Teks header dicopot dari sini karena sudah dipindah ke HTML statis

        for (let key in cart) {
          const item = cart[key];
          count += item.qty;
          const subtotal = item.qty * item.data.harga;
          total += subtotal;

          let displaySubtotal = new Intl.NumberFormat("id-ID", {
            style: "currency",
            currency: "IDR",
            minimumFractionDigits: 0,
          }).format(subtotal);

          recapHtml += `
            <div class="recap-item">
              <span>${item.data.nama} <small style="color:#aaa; font-weight:bold;">(${item.qty}x)</small></span>
              <b>${displaySubtotal}</b>
            </div>
          `;
        }

        const recapContainer = document.getElementById("recapList");
        const recapHeader = document.getElementById("recapHeader");
        const recapCountBadge = document.getElementById("recapCountBadge");

        if (count > 0) {
          recapContainer.innerHTML = recapHtml;
          recapHeader.style.display = "flex"; // Munculkan header
          recapCountBadge.innerText = count; // Update angka di header
        } else {
          recapContainer.innerHTML = "";
          recapHeader.style.display = "none"; // Sembunyikan jika kosong
          recapContainer.classList.remove("show"); // Tutup paksa jika kosong
          document
            .getElementById("recapToggleIcon")
            .classList.replace("fa-chevron-down", "fa-chevron-up");
        }

        document.getElementById("countItem").innerText =
          Object.keys(cart).length + " Peserta (" + count + "x)";

        document.getElementById("totalMoney").innerText = new Intl.NumberFormat(
          "id-ID",
          { style: "currency", currency: "IDR", minimumFractionDigits: 0 },
        ).format(total);

        const btn = document.getElementById("btnProses");
        btn.disabled = total <= 0;
      }
    </script>
  </body>
